experiment:
  name: smoke_single_gpu_3090
  device: cuda:0
  gpu_name: RTX_3090
  vram_gb: 24
  seed: 42
  output_root: results/smoke_single_gpu_3090

baseline:
  models:
    - qwen3_0_6b
    - qwen3_1_7b
    - qwen3_4b
    - qwen3_8b
    - qwen2_5_7b_instruct
    - deepseek_r1_distill_qwen_7b
    - phi_3_mini_4k_instruct
    - yi_6b_chat
    - mistral_7b_instruct_v0_3
  tasks:
    - domain_qa_smoke
  num_fewshot: 0
  batch_size: 1
  precision: int4
  max_new_tokens: 64
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  efficiency_prompt_file: data/efficiency/prompts.jsonl
  efficiency_num_samples: 1
  warmup_prompts: 0

quantization:
  modes:
    - int4

qlora:
  candidate_models:
    - qwen3_4b
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - up_proj
    - down_proj
    - gate_proj
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.05
  learning_rate: 2.0e-4
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_seq_length: 1024
  warmup_ratio: 0.03
  logging_steps: 5
  save_strategy: epoch
  evaluation_strategy: epoch
